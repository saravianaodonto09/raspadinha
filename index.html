<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raspadinha Especial</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

background:
radial-gradient(circle at top left,#ffe4f4 0%,transparent 35%),
radial-gradient(circle at bottom right,#e7d8ff 0%,transparent 35%),
linear-gradient(135deg,#ffd6ef,#dcc8ff);

overflow:hidden;

position:relative;

}

body::before{

content:"";

position:absolute;

width:650px;

height:650px;

border-radius:50%;

background:rgba(255,255,255,.18);

top:-220px;

left:-220px;

filter:blur(90px);

}

body::after{

content:"";

position:absolute;

width:500px;

height:500px;

border-radius:50%;

background:rgba(255,255,255,.15);

bottom:-180px;

right:-180px;

filter:blur(80px);

}

.card{

width:410px;

max-width:100%;

background:rgba(255,250,247,.97);

border-radius:34px;

padding:34px;

position:relative;

z-index:2;

border:1px solid rgba(255,255,255,.65);

box-shadow:

0 30px 70px rgba(91,39,109,.18),

0 8px 18px rgba(255,255,255,.55) inset;

animation:entrada .8s ease;

}

.header{

text-align:center;

margin-bottom:28px;

}

.heart{

font-size:54px;

display:inline-block;

margin-bottom:14px;

animation:heartbeat 2s infinite;

}

.header h1{

font-size:31px;

color:#7d2e74;

margin-bottom:12px;

font-weight:700;

letter-spacing:1px;

}

.header p{

color:#6d6d6d;

font-size:15px;

line-height:1.6;

}
.scratch-area{

position:relative;

height:320px;

margin-top:30px;

border-radius:22px;

overflow:hidden;

background:#fff4ec;

border:2px solid #f3d4e4;

box-shadow:
inset 0 3px 12px rgba(255,255,255,.75),
0 10px 30px rgba(0,0,0,.08);

}

.prize{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

padding:25px;

text-align:center;

background:
linear-gradient(180deg,#fffaf8,#fff3ee);

}

.prize h2{

font-size:28px;

line-height:1.3;

color:#c84d82;

margin-bottom:18px;

}

.prize p{

font-size:15px;

line-height:1.6;

color:#666;

margin-bottom:18px;

}

.codigo{

display:inline-block;

padding:16px 34px;

border-radius:14px;

border:2px dashed #d46b95;

background:#ffe5ef;

color:#7a2b73;

font-size:30px;

font-weight:700;

letter-spacing:6px;

box-shadow:
0 6px 18px rgba(212,107,149,.25);

}

canvas{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

cursor:pointer;

}

.footer{

margin-top:22px;

text-align:center;

font-size:14px;

color:#777;

}

@keyframes heartbeat{

0%,100%{

transform:scale(1);

}

25%{

transform:scale(1.08);

}

50%{

transform:scale(1);

}

75%{

transform:scale(1.08);

}

}

@keyframes entrada{

from{

opacity:0;

transform:translateY(25px) scale(.96);

}

to{

opacity:1;

transform:translateY(0) scale(1);

}

}
</style>

</head>

<body>

<div class="card">

<div class="header">

<div class="heart">❤️</div>

<h1>RASPADINHA ESPECIAL</h1>

<p>

Raspe a área abaixo para descobrir a sua surpresa.

</p>

</div>

<div class="scratch-area">

<div class="prize">

<h2>

VOCÊ RECEBEU UM CAFUNÉ VIRTUAL DA SARA

</h2>

<p>

Caso queira retirá-lo presencialmente,<br>

utilize o código

</p>

<div class="codigo">

C4FUN3

</div>

</div>

<canvas id="scratch"></canvas>

</div>

<div class="footer">

💗 Raspe aproximadamente metade da área.

</div>

</div>

<script>

const canvas=document.getElementById("scratch");

const ctx=canvas.getContext("2d");

function desenharRaspadinha(){

canvas.width=canvas.offsetWidth;

canvas.height=canvas.offsetHeight;

const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);

grad.addColorStop(0,"#bdbdbd");

grad.addColorStop(.25,"#f7f7f7");

grad.addColorStop(.5,"#d9d9d9");

grad.addColorStop(.75,"#ffffff");

grad.addColorStop(1,"#b7b7b7");

ctx.fillStyle=grad;

ctx.fillRect(0,0,canvas.width,canvas.height);
for(let i=0;i<1500;i++){

ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.45})`;

ctx.fillRect(

Math.random()*canvas.width,

Math.random()*canvas.height,

2,

2

);

}

ctx.fillStyle="rgba(90,90,90,.45)";

ctx.font="bold 34px Poppins";

ctx.textAlign="center";

ctx.fillText("RASPE AQUI",canvas.width/2,canvas.height/2);

}

desenharRaspadinha();

window.addEventListener("resize",desenharRaspadinha);

ctx.lineCap="round";

ctx.lineJoin="round";

ctx.lineWidth=42;

let raspando=false;

function posicao(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){

return{

x:e.touches[0].clientX-rect.left,

y:e.touches[0].clientY-rect.top

};

}

return{

x:e.clientX-rect.left,

y:e.clientY-rect.top

};

}

function raspar(e){

if(!raspando)return;

e.preventDefault();

const p=posicao(e);

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();

ctx.arc(p.x,p.y,26,0,Math.PI*2);

ctx.fill();

verificar();

}

canvas.addEventListener("mousedown",()=>raspando=true);

canvas.addEventListener("mouseup",()=>raspando=false);

canvas.addEventListener("mouseleave",()=>raspando=false);

canvas.addEventListener("mousemove",raspar);

canvas.addEventListener("touchstart",()=>raspando=true);

canvas.addEventListener("touchend",()=>raspando=false);

canvas.addEventListener("touchmove",raspar,{passive:false});

function verificar(){

const pixels=ctx.getImageData(0,0,canvas.width,canvas.height);

let transparentes=0;

for(let i=3;i<pixels.data.length;i+=4){

if(pixels.data[i]===0){

transparentes++;

}

}

const porcentagem=transparentes/(canvas.width*canvas.height);

if(porcentagem>0.5){

canvas.style.transition="opacity .8s";

canvas.style.opacity="0";

setTimeout(()=>{

canvas.style.display="none";

},800);

}

}

</script>

</body>

</html>
